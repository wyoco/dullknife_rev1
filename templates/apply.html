<!DOCTYPE html>                                                                                                                    
<html lang="en">
<head>                                                                                                                             
    <meta charset="UTF-8">                                
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dullknife - Apply for Membership</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="/">Dullknife</a></div>
            <ul>
                <li><a href="/directory">Member Directory</a></li>
                <li>{% if request.cookies.get("member_id") %}<a href="/logout">Logout</a>{% else %}<a href="/login">Member Login</a>{% endif %}</li>
                <li><a href="/apply">Apply for Membership</a></li>
                <li><a href="/about">About Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Apply for Membership</h1>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post" action="/apply">
            <div class="form-group">
                <label>Username *</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" name="first_name" required>
            </div>
            <div class="form-group">
                <label>Middle Name</label>
                <input type="text" name="middle_name">
            </div>
            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" name="last_name" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Address *</label>
                <input type="text" name="address" required>
            </div>
            <div class="form-group">
                <label>City *</label>
                <input type="text" name="city" required>
            </div>
            <div class="form-group">
                <label>State *</label>
                <input type="text" name="state" required>
            </div>
            <div class="form-group">
                <label>Zip Code *</label>
                <input type="text" name="zipcode" required>
            </div>
            <div class="form-group">
                <label>Phone 1 *</label>
                <input type="text" name="phone_1" required>
            </div>
            <div class="form-group">
                <label>Phone 2</label>
                <input type="text" name="phone_2">
            </div>
            <div class="form-group">
                <label>Summary of Skills and Abilities *</label>
                <textarea name="skills_summary" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label>Disciplines (select at least one) *</label>
                <div class="disciplines-list">
                    {% for discipline in disciplines %}
                    <label>
                        <input type="checkbox" name="discipline_ids" value="{{ discipline.id }}">
                        {{ discipline.name }}
                    </label>
                    {% endfor %}
                </div>
            </div>
            <div class="form-buttons">
                <button type="submit">Submit</button>
                <a href="/" class="button">Cancel</a>
            </div>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Dullknife</p>
    </footer>
</body>
</html>
