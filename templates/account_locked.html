<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dullknife - Account Locked</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="/">Dullknife</a></div>
            <ul>
                <li><a href="/directory">Member Directory</a></li>
                <li>{% if request.cookies.get("member_id") %}<a href="/logout">Logout</a>{% else %}<a href="/login">Member Login</a>{% endif %}</li>
                <li><a href="/apply">Apply for Membership</a></li>
                <li><a href="/about">About Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Account Locked</h1>
        <p class="error">Maximum number of Login Attempts Reached. This Account is disabled for a period of one hour.</p>
        <div class="form-buttons">
            <a href="/" class="button">Home</a>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Dullknife</p>
    </footer>
</body>
</html>
