<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dullknife - Member Page</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="/">Dullknife</a></div>
            <ul>
                <li><a href="/directory">Member Directory</a></li>
                <li><a href="/logout">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Welcome, {{ member.first_name }}</h1>
        <form method="post" action="/member" id="member-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" value="{{ member.username }}" disabled>
            </div>
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" name="first_name" value="{{ member.first_name }}" disabled data-editable required>
            </div>
            <div class="form-group">
                <label>Middle Name</label>
                <input type="text" name="middle_name" value="{{ member.middle_name or '' }}" disabled data-editable>
            </div>
            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" name="last_name" value="{{ member.last_name }}" disabled data-editable required>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" value="{{ member.address or '' }}" disabled data-editable>
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" value="{{ member.city or '' }}" disabled data-editable>
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" name="state" value="{{ member.state or '' }}" disabled data-editable>
            </div>
            <div class="form-group">
                <label>ZIP Code</label>
                <input type="text" name="zipcode" value="{{ member.zipcode or '' }}" disabled data-editable>
            </div>
            <div class="form-group">
                <label>Phone 1</label>
                <input type="text" name="phone_1" value="{{ member.phone_1 or '' }}" disabled data-editable>
            </div>
            <div class="form-group">
                <label>Phone 2</label>
                <input type="text" name="phone_2" value="{{ member.phone_2 or '' }}" disabled data-editable>
            </div>
            <div class="form-group">
                <label>Skills Summary</label>
                <textarea name="skills_summary" disabled data-editable rows="4">{{ member.skills_summary or '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Disciplines</label>
                <div class="disciplines">
                    {% for d in disciplines %}
                    <label class="checkbox-label">
                        <input type="checkbox" name="disciplines" value="{{ d.id }}"
                               {% if d.checked %}checked{% endif %}
                               disabled data-editable>
                        {{ d.name }}
                    </label>
                    {% endfor %}
                </div>
            </div>
            <div class="form-buttons">
                <button type="button" id="btn-edit" onclick="enableEdit()">Edit</button>
                <button type="submit" id="btn-save" style="display:none">Save</button>
                <button type="button" id="btn-cancel" style="display:none" onclick="location.reload()">Cancel</button>
                <a href="/" class="button">Home</a>
            </div>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Dullknife</p>
    </footer>
    <script>
        function enableEdit() {
            document.querySelectorAll('[data-editable]').forEach(el => el.disabled = false);
            document.getElementById('btn-edit').style.display = 'none';
            document.getElementById('btn-save').style.display = 'inline-block';
            document.getElementById('btn-cancel').style.display = 'inline-block';
        }
    </script>
</body>
</html>
