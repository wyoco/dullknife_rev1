<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dullknife - Add Advertiser</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico">
</head>
<body>
        <header>
        <nav>
            <div class="logo"><a href="/"><img src="/static/images/jackRound.jpg" alt="Dullknife" class="nav-logo"></a></div>
            <ul>
                <li><a href="/admin">Admin Panel</a></li>
                <li><a href="/admin/logout">Admin Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Add Advertiser</h1>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post" action="/admin/advertising/add" enctype="multipart/form-data" style="max-width:500px;">
            <div style="margin-bottom:1rem;">
                <label style="display:block; margin-bottom:0.3rem; font-weight:bold;">Company Name *</label>
                <input type="text" name="company_name" required style="width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:3px;">
            </div>

            <div style="margin-bottom:1rem;">
                <label style="display:block; margin-bottom:0.3rem; font-weight:bold;">Website URL</label>
                <input type="url" name="website_url" placeholder="https://example.com"
                       style="width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:3px;">
            </div>

            <div style="margin-bottom:1rem;">
                <label style="display:block; margin-bottom:0.3rem; font-weight:bold;">Display Order</label>
                <input type="number" name="display_order" value="0" min="0"
                       style="width:120px; padding:0.5rem; border:1px solid #ccc; border-radius:3px;">
                <small style="display:block; color:#666; margin-top:0.2rem;">Lower numbers appear first.</small>
            </div>

            <div style="margin-bottom:1.5rem;">
                <label style="display:block; margin-bottom:0.3rem; font-weight:bold;">Banner Image * (must be exactly 300&times;100 px)</label>
                <input type="file" name="image" accept=".jpg,.jpeg,.png,.gif,.webp" required>
                <small style="display:block; color:#666; margin-top:0.2rem;">Accepted: .jpg .jpeg .png .gif .webp</small>
            </div>

            <button type="submit" class="button admin-btn" style="width:auto; padding:0.6rem 1.5rem;">Add Advertiser</button>
            <a href="/admin/advertising" style="margin-left:1rem;">Cancel</a>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Dullknife</p>
    </footer>
</body>
</html>
