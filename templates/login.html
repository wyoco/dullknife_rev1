<!DOCTYPE html>                                                                                                                    
<html lang="en">
<head>                                                                                                                             
    <meta charset="UTF-8">                                                                                                       
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dullknife - Member Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Dullknife</div>
            <ul>
                <li><a href="/directory">Member Directory</a></li>
                <li><a href="/login">Member Login</a></li>
                <li><a href="/apply">Apply for Membership</a></li>
                <li><a href="/about">About Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Member Login</h1>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        {% if warning %}
        <p class="warning">{{ warning }}</p>
        {% endif %}
        <form method="post" action="/login">
            <div class="form-group">
                <label>Username *</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="suppress_recaptcha">
                    This is a private computer
                </label>
            </div>
            <div class="form-buttons">
                <button type="submit">Login</button>
                <a href="/" class="button">Cancel</a>
            </div>
        </form>
        <div class="login-links">
            <a href="/reset-password">Forgot your password?</a>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Dullknife</p>
    </footer>
</body>
</html>
