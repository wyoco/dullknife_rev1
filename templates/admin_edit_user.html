<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dullknife - Edit User</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico">
</head>
<body>
        <header>
        <nav>
            <div class="logo"><a href="/"><img src="/static/images/jackRound.jpg" alt="Dullknife" class="nav-logo"></a></div>
            <ul>
                <li><a href="/admin">Admin Panel</a></li>
                <li><a href="/admin/logout">Admin Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Edit User: {{ member.username }}</h1>
        {% if message %}
        <p class="success">{{ message }}</p>
        {% endif %}
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post" action="/admin/edit-user/{{ member.id }}">
            <div class="form-group">
                <label>Member Status</label>
                <div class="disciplines">
                    <label class="checkbox-label">
                        <input type="radio" name="member_type" value="current" {% if member.member_type == 'current' %}checked{% endif %}> Current
                    </label>
                    <label class="checkbox-label">
                        <input type="radio" name="member_type" value="applicant" {% if member.member_type == 'applicant' %}checked{% endif %}> Applicant
                    </label>
                    <label class="checkbox-label">
                        <input type="radio" name="member_type" value="banned" {% if member.member_type == 'banned' %}checked{% endif %}> Banned
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" value="{{ member.username }}" required>
            </div>
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ member.first_name }}">
            </div>
            <div class="form-group">
                <label>Middle Name</label>
                <input type="text" name="middle_name" value="{{ member.middle_name or '' }}">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ member.last_name }}">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ member.email }}" required>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" value="{{ member.address or '' }}">
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" value="{{ member.city or '' }}">
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" name="state" value="{{ member.state or '' }}">
            </div>
            <div class="form-group">
                <label>ZIP Code</label>
                <input type="text" name="zipcode" value="{{ member.zipcode or '' }}">
            </div>
            <div class="form-group">
                <label>Phone 1</label>
                <input type="text" name="phone_1" value="{{ member.phone_1 or '' }}">
            </div>
            <div class="form-group">
                <label>Phone 2</label>
                <input type="text" name="phone_2" value="{{ member.phone_2 or '' }}">
            </div>
            <div class="form-group">
                <label>Skills Summary</label>
                <textarea name="skills_summary" rows="4">{{ member.skills_summary or '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Disciplines</label>
                <div class="disciplines">
                    {% for d in disciplines %}
                    <label class="checkbox-label">
                        <input type="checkbox" name="disciplines" value="{{ d.id }}"
                               {% if d.checked %}checked{% endif %}>
                        {{ d.name }}
                    </label>
                    {% endfor %}
                </div>
            </div>
            <div class="form-group">
                <label>Admin Notes</label>
                <textarea name="admin_notes" rows="4">{{ member.admin_notes or '' }}</textarea>
            </div>
            <div class="form-buttons">
                <button type="submit" name="action" value="update">Update</button>
                {% if member.member_type == 'applicant' %}
                <button type="submit" name="action" value="approve">Approve</button>
                <button type="submit" name="action" value="reject">Reject</button>
                {% endif %}
                <a href="/admin/manage-users" class="button">Cancel</a>
            </div>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Dullknife</p>
    </footer>
</body>
</html>
